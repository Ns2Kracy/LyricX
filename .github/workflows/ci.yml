name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test and build
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run unit tests
        run: swift run LyricXUnitTests

      - name: Build Swift package
        run: swift build

      - name: Build app bundle
        run: bash scripts/build-app.sh

      - name: Package app artifact
        run: bash scripts/package-release.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: LyricX
          path: |
            dist/LyricX.zip
            dist/LyricX.zip.sha256
          if-no-files-found: error
